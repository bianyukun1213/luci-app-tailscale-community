name: Build OpenWrt Package

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  PACKAGE_NAME: luci-app-tailscale-community
  OPENWRT_VERSION: "25.12.0"

permissions:
  contents: write

jobs:
  build:
    name: Build aarch64_generic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout package repository
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Setup usign
        run: |
          git clone --depth 1 https://github.com/openwrt/usign.git
          cd usign && mkdir build && cd build
          cmake .. && make -j$(nproc)
          sudo make install
          cd ../.. && rm -rf usign

      - name: Pull OpenWrt SDK Docker image
        run: |
          docker pull ghcr.io/openwrt/sdk:aarch64_generic-V${{ env.OPENWRT_VERSION }}

      - name: Determine version
        id: version
        working-directory: repo
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            RELEASE="1"
          else
            VERSION=$(date +"%Y.%m.%d")
            SHORT_SHA=$(git rev-parse --short HEAD)
            RELEASE="${{ github.run_number }}.git-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}" >> $GITHUB_OUTPUT
          echo "Build version: ${VERSION}-${RELEASE}"

      - name: Prepare build environment
        run: |
          mkdir -p bin build_pkg keys

          # 复制包源码（复制目录内容，不要嵌套）
          cp -r repo/luci-app-tailscale-community/. build_pkg/

          # 动态注入版本号（如果 Makefile 中没有 PKG_VERSION）
          TARGET_MK="build_pkg/Makefile"
          if ! grep -q "^PKG_VERSION:=" "$TARGET_MK"; then
            sed -i "s|include \$(TOPDIR)/rules.mk|include \$(TOPDIR)/rules.mk\nPKG_VERSION:=${{ steps.version.outputs.version }}\nPKG_RELEASE:=${{ steps.version.outputs.release }}|" "$TARGET_MK"
          fi

          chmod -R 777 bin

      - name: Build APK package
        run: |
          docker run --rm \
            -v "$(pwd)/bin:/builder/bin:z" \
            -v "$(pwd)/build_pkg:/builder/package/${{ env.PACKAGE_NAME }}:ro,z" \
            -e TERM=xterm \
            -e FORCE=1 \
            ghcr.io/openwrt/sdk:aarch64_generic-V${{ env.OPENWRT_VERSION }} \
            bash -c '
              set -e

              # 更新 feeds（获取 luci 依赖）
              ./scripts/feeds update -a
              ./scripts/feeds install -a || true

              TRANSLATION_PKG="${{ env.PACKAGE_NAME }}"
              TRANSLATION_PKG="${TRANSLATION_PKG#luci-app-}"

              # 配置构建
              cat > .config <<EOF
          CONFIG_PACKAGE_${{ env.PACKAGE_NAME }}=m
          CONFIG_PACKAGE_luci-i18n-${TRANSLATION_PKG}-zh-cn=m
          CONFIG_PACKAGE_luci-i18n-${TRANSLATION_PKG}-zh-tw=m
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_LUCI_LANG_zh_Hant=y
          CONFIG_USE_APK=y
          EOF
              make defconfig
              make package/${{ env.PACKAGE_NAME }}/compile V=sw -j$(nproc)
            '

      - name: Collect artifacts
        id: collect_artifacts
        run: |
          TRANSLATION_PKG="${PACKAGE_NAME#luci-app-}"
          mkdir -p upload/all

          # 收集 APK 包
          find bin/packages -type f \( -name "${PACKAGE_NAME}*.apk" -o -name "luci-i18n-${TRANSLATION_PKG}-*.apk" \) -exec cp {} upload/all/ \;

          if [ -z "$(ls -A upload/all/)" ]; then
            echo "::error::No packages found!"
            exit 1
          fi

          # 签名处理
          if [ -z "${{ secrets.USIGN_KEY }}" ]; then
            echo "::warning title=Missing USIGN_KEY::GitHub Secret 'USIGN_KEY' is not set. A temporary key has been generated for this build."
            usign -G -s /tmp/key-build.sig -p "upload/all/key-build.pub" -c "Local build key"
            echo "::warning::Temporary signing key generated. Please save the following Private Key to your repository secrets as 'USIGN_KEY' to maintain consistent signatures:"
            echo "------------------- BEGIN KEY -------------------"
            cat /tmp/key-build.sig
            echo "-------------------- END KEY --------------------"
          else
            echo "${{ secrets.USIGN_KEY }}" > /tmp/key-build.sig
            KEY_HEX=$(tail -n 1 /tmp/key-build.sig | base64 -d | xxd -p | tr -d '\n')
            [ ${#KEY_HEX} -eq 208 ] || { echo "::error::Invalid USIGN_KEY (expected 104 bytes)"; exit 1; }
            echo "untrusted comment: public key ${KEY_HEX:64:16}" > "upload/all/key-build.pub"
            echo "${KEY_HEX:0:4}${KEY_HEX:64:16}${KEY_HEX:144:64}" | xxd -r -p | base64 -w 0 >> "upload/all/key-build.pub"
          fi

          # 生成索引 - 使用 SDK Docker 容器内的 apk 工具（支持 APK v3）
          if ls upload/all/*.apk >/dev/null 2>&1; then
            docker run --rm \
              -v "$(pwd)/upload/all:/work:z" \
              -w /work \
              ghcr.io/openwrt/sdk:aarch64_generic-V${{ env.OPENWRT_VERSION }} \
              bash -c './staging_dir/host/bin/apk mkndx --allow-untrusted -o APKINDEX.tar.gz *.apk'
            usign -S -m "upload/all/APKINDEX.tar.gz" -s /tmp/key-build.sig -x "upload/all/APKINDEX.tar.gz.sig"
          fi

          # 清理私钥
          rm -f /tmp/key-build.sig

          echo "path=upload" >> $GITHUB_OUTPUT
          echo "Artifacts collected:"
          ls -la upload/all/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-aarch64_generic
          path: upload/

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Organize and Deploy
        run: |
          mkdir -p deploy/all

          find downloaded-artifacts/packages-* -type f \( -name "*.apk" -o -name "APKINDEX*" -o -name "key-build.pub" \) -exec cp {} deploy/all/ \;

          # 验证没有私钥文件泄露
          if find deploy -name "key-build.sig" -type f | grep -q .; then
            echo "::error::Private key file (key-build.sig) found in deploy directory!"
            exit 1
          fi

          touch deploy/.nojekyll

          cat <<EOF > deploy/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>${{ env.PACKAGE_NAME }} Repository</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 40px auto; padding: 0 20px; color: #333; }
                  pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; }
                  code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
                  .footer { margin-top: 40px; font-size: 0.8em; color: #666; border-top: 1px solid #eee; padding-top: 20px; }
              </style>
          </head>
          <body>
              <h1>${{ env.PACKAGE_NAME }} APK Feed</h1>
              <p>这是 <strong>${{ env.PACKAGE_NAME }}</strong> 的官方软件源托管地址（OpenWrt 25.x APK 格式）。</p>

              <h3>如何使用 (How to use)</h3>
              <p>在你的 OpenWrt 25.x 终端运行以下命令：</p>
              <pre><code># 1. 添加公钥
          wget https://$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]').github.io/${{ env.PACKAGE_NAME }}/all/key-build.pub -O /etc/apk/keys/key-build.pub

          # 2. 添加软件源
          echo "https://$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]').github.io/${{ env.PACKAGE_NAME }}/all" >> /etc/apk/repositories

          # 3. 更新并安装
          apk update
          apk add ${{ env.PACKAGE_NAME }}</code></pre>

              <div class="footer">
                  <p>Generated by GitHub Actions at $(date -u)</p>
                  <p><a href="https://github.com/${{ github.repository }}">View on GitHub</a></p>
              </div>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/packages-*/**/*.apk
